<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>真一格书签</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 顶部装饰条 -->
  <div class="top-bar"></div>

  <!-- 顶部导航 -->
  <header>
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">📚</span>
        <span class="logo-text">真一格书签</span>
      </div>
      <div class="search-box">
        <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" id="searchInput" placeholder="搜索书签...">
      </div>
    </div>
  </header>

  <!-- 分类标签 -->
  <div class="category-bar">
    <div class="category-inner" id="categoryBar">
      <button class="cat-btn active" data-cat="all">全部</button>
    </div>
  </div>

  <!-- 书签列表 -->
  <main>
    <div class="bookmark-grid" id="bookmarkGrid"></div>
    <div class="empty-tip" id="emptyTip" style="display:none">
      <svg class="icon-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
      <p>暂无书签</p>
    </div>
  </main>

  <footer>
    <p>© 2026 真一格 · 用 <span style="color: var(--accent-pink);">♥</span> 记录生活</p>
  </footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
