<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>men’书签</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 顶部导航 -->
  <header>
    <div class="header-inner">
      <div class="logo">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
        <span>真一格书签</span>
      </div>
      <div class="search-box">
        <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" id="searchInput" placeholder="搜索书签...">
      </div>
      <a href="admin.html" class="admin-btn">
        <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
        管理
      </a>
    </div>
  </header>

  <!-- 分类标签 -->
  <div class="category-bar">
    <div class="category-inner" id="categoryBar">
      <button class="cat-btn active" data-cat="all">全部</button>
    </div>
  </div>

  <!-- 书签列表 -->
  <main>
    <div class="bookmark-grid" id="bookmarkGrid"></div>
    <div class="empty-tip" id="emptyTip" style="display:none">
      <svg class="icon-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
      <p>暂无书签</p>
    </div>
  </main>

  <footer>
    <p>Powered by <a href="https://github.com" target="_blank">GitHub Pages</a></p>
  </footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
