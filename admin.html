<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>书签管理后台</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="style.css">
</head>
<body class="admin-page">

  <!-- 登录弹窗 -->
  <div class="login-mask" id="loginMask">
    <div class="login-box">
      <div class="login-logo">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
        书签管理
      </div>
      <input type="password" id="loginPwd" placeholder="请输入管理密码" />
      <button onclick="doLogin()">登 录</button>
      <p class="login-tip" id="loginTip"></p>
    </div>
  </div>

  <!-- 后台主界面 -->
  <div class="admin-wrap" id="adminWrap" style="display:none">
    <header>
      <div class="header-inner">
        <div class="logo">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
          书签管理后台
        </div>
        <div>
          <a href="index.html" class="admin-btn" style="margin-right:8px">
            <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            前台
          </a>
          <button class="admin-btn" onclick="doLogout()">
            <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            退出
          </button>
        </div>
      </div>
    </header>

    <div class="admin-body">
      <!-- 左侧：添加/编辑表单 -->
      <div class="admin-form-panel">
        <h3 id="formTitle">
          <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          添加书签
        </h3>
        <input type="hidden" id="editId">
        <div class="form-group">
          <label>书签名称 *</label>
          <input type="text" id="fName" placeholder="例：百度">
        </div>
        <div class="form-group">
          <label>网址 *</label>
          <input type="url" id="fUrl" placeholder="https://www.baidu.com">
        </div>
        <div class="form-group">
          <label>分类</label>
          <div class="cat-input-row">
            <select id="fCat">
              <option value="">-- 选择分类 --</option>
            </select>
            <input type="text" id="fCatNew" placeholder="或新建分类">
          </div>
        </div>
        <div class="form-group">
          <label>描述</label>
          <input type="text" id="fDesc" placeholder="简短描述">
        </div>
        <div class="form-btns">
          <button class="btn-primary" onclick="saveBookmark()">
            <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
            保存
          </button>
          <button class="btn-secondary" onclick="resetForm()">
            <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>
            重置
          </button>
        </div>
        <div class="form-tip" id="formTip"></div>

        <!-- 导出/导入 -->
        <div class="import-export">
          <h4>
            <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path></svg>
            数据管理
          </h4>
          <button class="btn-export" onclick="exportData()">
            <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            导出数据
          </button>
          <button class="btn-export" onclick="document.getElementById('importFile').click()">
            <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            导入数据
          </button>
          <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
          <p class="export-tip">导出后替换 data.js 中的数据即可更新网站</p>
        </div>
      </div>

      <!-- 右侧：书签列表 -->
      <div class="admin-list-panel">
        <div class="list-header">
          <h3>
            <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
            书签列表 <span id="totalCount"></span>
          </h3>
          <input type="text" id="adminSearch" placeholder="搜索..." oninput="renderAdminList()">
        </div>
        <div class="admin-cat-filter">
          <button class="cat-btn active" data-cat="all" onclick="filterAdminCat(this,'all')">全部</button>
        </div>
        <div id="adminList"></div>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="admin.js"></script>
</body>
</html>
