<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>书签管理后台</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="admin-page">

  <!-- 登录弹窗 -->
  <div class="login-mask" id="loginMask">
    <div class="login-box">
      <div class="login-logo"><i class="fa-solid fa-bookmark"></i> 书签管理</div>
      <input type="password" id="loginPwd" placeholder="请输入管理密码" />
      <button onclick="doLogin()">登 录</button>
      <p class="login-tip" id="loginTip"></p>
    </div>
  </div>

  <!-- 后台主界面 -->
  <div class="admin-wrap" id="adminWrap" style="display:none">
    <header>
      <div class="header-inner">
        <div class="logo"><i class="fa-solid fa-bookmark"></i> 书签管理后台</div>
        <div>
          <a href="index.html" class="admin-btn" style="margin-right:8px"><i class="fa-solid fa-home"></i> 前台</a>
          <button class="admin-btn" onclick="doLogout()"><i class="fa-solid fa-right-from-bracket"></i> 退出</button>
        </div>
      </div>
    </header>

    <div class="admin-body">
      <!-- 左侧：添加/编辑表单 -->
      <div class="admin-form-panel">
        <h3 id="formTitle"><i class="fa-solid fa-plus"></i> 添加书签</h3>
        <input type="hidden" id="editId">
        <div class="form-group">
          <label>书签名称 *</label>
          <input type="text" id="fName" placeholder="例：百度">
        </div>
        <div class="form-group">
          <label>网址 *</label>
          <input type="url" id="fUrl" placeholder="https://www.baidu.com">
        </div>
        <div class="form-group">
          <label>分类</label>
          <div class="cat-input-row">
            <select id="fCat">
              <option value="">-- 选择分类 --</option>
            </select>
            <input type="text" id="fCatNew" placeholder="或新建分类">
          </div>
        </div>
        <div class="form-group">
          <label>图标（留空自动获取）</label>
          <input type="url" id="fIcon" placeholder="https://...favicon.ico">
        </div>
        <div class="form-group">
          <label>描述</label>
          <input type="text" id="fDesc" placeholder="简短描述">
        </div>
        <div class="form-btns">
          <button class="btn-primary" onclick="saveBookmark()"><i class="fa-solid fa-floppy-disk"></i> 保存</button>
          <button class="btn-secondary" onclick="resetForm()"><i class="fa-solid fa-rotate-left"></i> 重置</button>
        </div>
        <div class="form-tip" id="formTip"></div>

        <!-- 导出/导入 -->
        <div class="import-export">
          <h4><i class="fa-solid fa-database"></i> 数据管理</h4>
          <button class="btn-export" onclick="exportData()"><i class="fa-solid fa-download"></i> 导出数据</button>
          <button class="btn-export" onclick="document.getElementById('importFile').click()"><i class="fa-solid fa-upload"></i> 导入数据</button>
          <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
          <p class="export-tip">导出后替换 data.js 中的数据即可更新网站</p>
        </div>
      </div>

      <!-- 右侧：书签列表 -->
      <div class="admin-list-panel">
        <div class="list-header">
          <h3><i class="fa-solid fa-list"></i> 书签列表 <span id="totalCount"></span></h3>
          <input type="text" id="adminSearch" placeholder="搜索..." oninput="renderAdminList()">
        </div>
        <div class="admin-cat-filter">
          <button class="cat-btn active" data-cat="all" onclick="filterAdminCat(this,'all')">全部</button>
        </div>
        <div id="adminList"></div>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="admin.js"></script>
</body>
</html>
